<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Crocodile Mummy — Redpath Museum</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;1,300&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0705;color:#e8dcc8;font-family:'Crimson Pro',Georgia,serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
header{text-align:center;padding:1.2rem 1rem 0.8rem;border-bottom:1px solid #2a2318;flex-shrink:0;}
.label{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.45em;color:#8a6e35;margin-bottom:0.4rem;}
h1{font-family:'Cinzel',serif;font-size:clamp(1.2rem,4vw,2rem);font-weight:900;color:#e8dcc8;}
h1 span{color:#C8A45A;}
.sub{font-size:0.85rem;color:#5a4a32;font-style:italic;margin-top:0.2rem;}
.canvas-wrapper{flex:1;position:relative;background:radial-gradient(ellipse at center,#1a1208 0%,#0a0705 80%);}
canvas{width:100%!important;height:100%!important;display:block;}
.hint{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);font-size:0.65rem;color:#3a2a18;font-style:italic;pointer-events:none;white-space:nowrap;}
.loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0705;}
.spinner{width:36px;height:36px;border:2px solid #2a2318;border-top-color:#C8A45A;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:0.8rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-text{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.3em;color:#8a6e35;}
footer{text-align:center;padding:0.5rem;border-top:1px solid #1a1510;flex-shrink:0;}
footer p{font-size:0.65rem;color:#3a2a18;font-style:italic;}
footer strong{color:#5a4a32;font-style:normal;}
</style>
</head>
<body>
<header>
  <div class="label">Redpath Museum · McGill University · 2026</div>
  <h1>Egyptian <span>Crocodile Mummy</span></h1>
  <p class="sub">Specimen RM2725 · micro-CT reconstruction · ~2,000 years old</p>
</header>
<div class="canvas-wrapper">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="load-text" id="loadText">Loading specimen...</div>
  </div>
  <canvas id="c"></canvas>
  <div class="hint">Drag to rotate · Scroll to zoom</div>
</div>
<footer>
  <p>Scanned at <strong>110 µm/voxel</strong> · Yxlon FF35 CT Scanner · Reznikov Lab · Department of Bioengineering</p>
</footer>

<script>
let scene, camera, renderer, model;
let rotX=0, rotY=0, targetX=0, targetY=0;
let down=false, last={x:0,y:0}, zoom=3.5;

function init() {
  const canvas = document.getElementById('c');
  const wrap = canvas.parentElement;
  renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(40, wrap.clientWidth/wrap.clientHeight, 0.001, 100);
  camera.position.z = zoom;

  scene.add(new THREE.AmbientLight(0xfff5e0, 0.7));
  const k = new THREE.DirectionalLight(0xfffaf0, 1.3); k.position.set(2,3,2); scene.add(k);
  const f = new THREE.DirectionalLight(0xc8d4ff, 0.4); f.position.set(-2,0,-1); scene.add(f);
  const r = new THREE.DirectionalLight(0xC8A45A, 0.4); r.position.set(0,-2,-2); scene.add(r);

  // Load loaders
  const s = document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  s.onload=()=>{
    const s2=document.createElement('script');
    s2.src='https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js';
    s2.onload=()=>{
      const draco=new THREE.DRACOLoader();
      draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
      const loader=new THREE.GLTFLoader();
      loader.setDRACOLoader(draco);
      loader.load('skeleton.glb',
        gltf=>{
          model=gltf.scene;
          model.traverse(child=>{
            if(child.isMesh){
              if(child.geometry.attributes.color){
                child.material=new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.6,metalness:0.1});
              } else {
                child.material.roughness=0.6;
                child.material.metalness=0.1;
              }
            }
          });
          const box=new THREE.Box3().setFromObject(model);
          const center=box.getCenter(new THREE.Vector3());
          const size=box.getSize(new THREE.Vector3());
          const scale=2.2/Math.max(size.x,size.y,size.z);
          model.scale.setScalar(scale);
          model.position.sub(center.multiplyScalar(scale));
          model.rotation.y=Math.PI*0.1;
          scene.add(model);
          document.getElementById('loading').style.display='none';
        },
        p=>{ document.getElementById('loadText').textContent=`Loading... ${Math.round(p.loaded/p.total*100)||''}%`; },
        e=>{ console.error(e); document.getElementById('loading').style.display='none'; }
      );
    };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);

  // Controls
  const cv=canvas;
  cv.addEventListener('mousedown',e=>{down=true;last={x:e.clientX,y:e.clientY};});
  cv.addEventListener('mouseup',()=>down=false);
  cv.addEventListener('mouseleave',()=>down=false);
  cv.addEventListener('mousemove',e=>{
    if(!down)return;
    targetY+=(e.clientX-last.x)*0.008;
    targetX+=(e.clientY-last.y)*0.008;
    targetX=Math.max(-Math.PI/2,Math.min(Math.PI/2,targetX));
    last={x:e.clientX,y:e.clientY};
  });
  cv.addEventListener('wheel',e=>{
    zoom=Math.max(1,Math.min(8,zoom+e.deltaY*0.003));
    camera.position.z=zoom;
    e.preventDefault();
  },{passive:false});
  let ld=0;
  cv.addEventListener('touchstart',e=>{
    if(e.touches.length===1){down=true;last={x:e.touches[0].clientX,y:e.touches[0].clientY};}
    else if(e.touches.length===2) ld=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  });
  cv.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1&&down){
      targetY+=(e.touches[0].clientX-last.x)*0.008;
      targetX+=(e.touches[0].clientY-last.y)*0.008;
      targetX=Math.max(-Math.PI/2,Math.min(Math.PI/2,targetX));
      last={x:e.touches[0].clientX,y:e.touches[0].clientY};
    } else if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      zoom=Math.max(1,Math.min(8,zoom-(d-ld)*0.01));
      camera.position.z=zoom; ld=d;
    }
  },{passive:false});
  cv.addEventListener('touchend',()=>down=false);

  window.addEventListener('resize',()=>{
    const w=wrap.clientWidth,h=wrap.clientHeight;
    camera.aspect=w/h; camera.updateProjectionMatrix();
    renderer.setSize(w,h);
  });

  animate();
}

function animate(){
  requestAnimationFrame(animate);
  rotX+=(targetX-rotX)*0.08;
  rotY+=(targetY-rotY)*0.08;
  if(model){model.rotation.x=rotX; model.rotation.y=Math.PI*0.1+rotY;}
  renderer.render(scene,camera);
}

const s=document.createElement('script');
s.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
s.onload=init;
document.head.appendChild(s);
</script>
</body>
</html>
